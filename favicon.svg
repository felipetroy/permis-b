<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Badge background -->
  <rect width="100" height="100" rx="22" fill="#4F46E5"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="32" stroke="white" stroke-width="6" fill="none"/>
  <!-- 3 spokes: top, bottom-left, bottom-right -->
  <line x1="50" y1="43" x2="50" y2="18" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="44" y1="54" x2="22" y2="67" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="56" y1="54" x2="78" y2="67" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="50" cy="50" r="7.5" fill="white"/>
</svg>
