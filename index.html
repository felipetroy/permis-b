function updateSM2(sm2Data, groupNum, quality) {
  // quality: 0-5 (SM-2 scale). Map: all correct=5, partial=3, all wrong=1
  const prev = sm2Data[String(groupNum)] || { interval: 1, easeFactor: 2.5, nextReview: 0 };
  let { interval, easeFactor } = prev;

  if (quality >= 3) {
    if (interval === 1) interval = 6;
    else interval = Math.round(interval * easeFactor);
    easeFactor = Math.max(1.3, easeFactor + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  } else {
    interval = 1;
  }

  const nextReview = Date.now() + interval * 86400000;
  return { ...sm2Data, [String(groupNum)]: { interval, easeFactor, nextReview } };
}

const POINTS = {
  study_correct: 10,
  study_partial: 3,
  study_wrong: 1,
  test_correct: 20,
  test_partial: 8,
  test_wrong: 2,
  test_session_complete: 30,
  test_session_perfect: 50,
  first_group_seen: 5,
  streak_day: 15,
};

function updateStreak(gam) {
  const today = new Date().toLocaleDateString('fr-CA'); // YYYY-MM-DD in local timezone
  const last = gam.streak.lastStudyDate;
  if (last === today) return gam; // already updated today
  let newCurrent = gam.streak.current;
  if (last !== null) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toLocaleDateString('fr-CA');
    if (last === yesterdayStr) {
      newCurrent = gam.streak.current + 1;
    } else {
      newCurrent = 1;
    }
  } else {
    newCurrent = 1;
  }
  const newLongest = Math.max(gam.streak.longest, newCurrent);
  return {
    ...gam,
    streak: { current: newCurrent, longest: newLongest, lastStudyDate: today },
  };
}

function applyBaseGamification(gam, { groupNum, basePoints }) {
  const prevDate = gam.streak.lastStudyDate;
  gam = updateStreak(gam);
  const isNewDay = gam.streak.lastStudyDate !== prevDate;

  let points = basePoints;

  // Streak day bonus (once per day on first action)
  if (isNewDay) points += POINTS.streak_day;

  // First group seen bonus
  if (!gam.stats.groupsFirstSeen.includes(groupNum)) {
    gam.stats.groupsFirstSeen = [...gam.stats.groupsFirstSeen, groupNum];
    points += POINTS.first_group_seen;
  }

  // First session date
  if (!gam.stats.firstSessionDate) {
    gam.stats.firstSessionDate = new Date().toLocaleDateString('fr-CA');
  }

  // Total answers
  gam.stats.totalAnswers = (gam.stats.totalAnswers || 0) + 1;

  // Apply total points
  gam.points = (gam.points || 0) + points;

  return gam;
}

function masteredCount(ratings) {
  const sm2 = loadSM2();
  return Object.entries(ratings).filter(([key, r]) => {
    const correct = r.correct || 0;
    const wrong = r.wrong || 0;
    const hasStreak = correct >= wrong && correct >= 3;
    const sm2Entry = sm2[key];
    const hasSM2 = sm2Entry && sm2Entry.interval >= 7;
    return hasStreak || hasSM2;
  }).length;
}

function evaluateBadges(gam, ratings) {
  const badges = gam.badges ? { ...gam.badges } : { ...DEFAULT_BADGES };
  const now = new Date().toISOString();
  const mc = masteredCount(ratings);
  const seen = gam.stats.groupsFirstSeen.length;

  const conditions = {
    premier_pas:      seen >= 1,
    moitie_chemin:    seen >= 50,
    tour_complet:     seen >= 100,
    premier_correct:  mc >= 1,
    'dix_maitrisés':  mc >= 10,
    moitie_maitrisee: mc >= 50,
    pret_examen:      mc >= 80,
    premier_test:     (gam.stats.testsCompleted || 0) >= 1,
    test_parfait:     (gam.stats.perfectTests || 0) >= 1,
    cinq_tests:       (gam.stats.testsCompleted || 0) >= 5,
    en_rythme:        (gam.streak.current || 0) >= 3,
    une_semaine:      (gam.streak.current || 0) >= 7,
    regularite:       (gam.streak.current || 0) >= 14,
  };

  const newlyUnlocked = [];
  for (const key of Object.keys(conditions)) {
    if (badges[key] == null && conditions[key]) {
      badges[key] = now;
      newlyUnlocked.push(key);
    }
  }

  return { updatedBadges: badges, newlyUnlocked };
}

function computeRank(ratings, gam) {

function getNextRankInfo(currentRank, masteredCt, testsCt, seenCt) {
  const thresholds = [
    { title: 'Candidat en route',   mc: 10, tests: 0, seen: 0 },
    { title: 'En bonne voie',       mc: 25, tests: 0, seen: 0 },
    { title: 'Sérieux candidat',    mc: 50, tests: 0, seen: 0 },
    { title: 'Presque prêt',        mc: 75, tests: 0, seen: 0 },
    { title: "Prêt pour l'examen",  mc: 80, tests: 3, seen: 0 },
    { title: 'Expert vérifications', mc: 95, tests: 5, seen: 0 },
  ];
  const next = thresholds[currentRank];

  if (next.mc > masteredCt) {

  }

    return { nextTitle: next.title, label: `${next.tests - testsCt} test${next.tests - testsCt > 1 ? 's' : ''} à compléter`, pct: Math.round((testsCt / next.tests) * 100) };
  }
  return null;
}

// ── Weighted shuffle (weak questions first) ───────────────
function buildWeightedOrder(ratings) {
  const indices = questionGroups.map((_, i) => i);
  const weighted = indices.flatMap(i => {
    const g = questionGroups[i];
    const key = String(g.num);
    const r = ratings[key];
    if (!r) return [i, i]; // unrated: weight 2
    const correct = r.correct || 0;
    const partial = r.partial || 0;
    const wrong = r.wrong || 0;
    const total = correct + partial + wrong;
    if (total === 0) return [i, i];
    const badRatio = (wrong + partial * 0.5) / total; // wrong=1, partial=0.5, correct=0
    const weight = Math.max(1, Math.round(1 + badRatio * 4)); // 1 to 5
    return Array(weight).fill(i);
  });
  // Fisher-Yates shuffle
  for (let i = weighted.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [weighted[i], weighted[j]] = [weighted[j], weighted[i]];
  }
  // Deduplicate while preserving weighted order
  const seen = new Set();
  const result = [];
  for (const idx of weighted) {
    if (!seen.has(idx)) { seen.add(idx); result.push(idx); }
  }
  // Append any missing (shouldn't happen but safety)
  for (let i = 0; i < questionGroups.length; i++) {
    if (!seen.has(i)) result.push(i);
  }
  return result;
}

// ── getTestSession ────────────────────────────────────────
function getTestSession(ratings) {
  const weak = questionGroups
    .map((g, i) => ({ idx: i, num: g.num }))
    .filter(({ num }) => {
      const r = ratings[String(num)];
      if (!r) return true;
      return (r.wrong || 0) > 0 || (r.partial || 0) > 0;
    });
  const pool = weak.length >= 3 ? weak : questionGroups.map((g, i) => ({ idx: i, num: g.num }));
  const arr = [...pool];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, 3).map(w => w.idx);
}

function TestSummary({ results, onRestart, onQuit }) {
  const correct = results.filter(r => r.groupGrade === 'correct').length;

  const wrong = results.length - correct - partial;
  return html`

      <p class="text-slate-500 text-sm mb-6">${correct}/3 groupes corrects</p>
      <div class="flex gap-3 w-full mb-6">
        <div class="flex-1 text-center bg-emerald-50 rounded-xl py-3">
          <div class="text-2xl font-black text-emerald-600">${correct}</div>
          <div class="text-xs text-emerald-500 mt-0.5">Correct</div>
        </div>
        <div class="flex-1 text-center bg-amber-50 rounded-xl py-3">
          <div class="text-2xl font-black text-amber-600">${partial}</div>
          <div class="text-xs text-amber-500 mt-0.5">Presque</div>
        </div>
        <div class="flex-1 text-center bg-red-50 rounded-xl py-3">
          <div class="text-2xl font-black text-red-600">${wrong}</div>
          <div class="text-xs text-red-500 mt-0.5">Faux</div>
        </div>
      </div>
      <button onClick=${onRestart}

        class="w-full py-3 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">

  `;
}

// ── HeatmapOverlay ─────────────────────────────────────────
function groupMasteryColor(rating) {
  if (!rating) return 'bg-slate-200';
  const correct = rating.correct || 0;
  const partial = rating.partial || 0;
  const wrong = rating.wrong || 0;
  const total = correct + partial + wrong;
  if (total === 0) return 'bg-slate-200';
  const score = (correct + partial * 0.5) / total;
  if (score >= 0.8) return 'bg-green-400';
  if (score >= 0.5) return 'bg-yellow-400';
  return 'bg-red-400';
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [ratings, setRatings] = useState(loadRatings);
  const [gamification, setGamification] = useState(loadGamification);
  const [shuffleMode, setShuffleMode] = useState(false);
  const [shuffleOrder, setShuffleOrder] = useState(null);
  const [groupIdx, setGroupIdx] = useState(0);
  const [resetSignal, setResetSignal] = useState(0);
  const [mode, setMode] = useState('study'); // 'study' | 'test'
  const [consentGiven, setConsentGiven] = useState(() => {
    try { return localStorage.getItem('permisb_consent_v1') === 'true'; } catch { return false; }
  });
  const [showConsentModal, setShowConsentModal] = useState(false);
  const [testAnswers, setTestAnswers] = useState({});
  const [testGrading, setTestGrading] = useState(false);
  const [testResults, setTestResults] = useState(null);
  const [testRevealed, setTestRevealed] = useState(false);
  const [testFeedback, setTestFeedback] = useState(null);
  const [testSession, setTestSession] = useState([]);
  const [testSessionIdx, setTestSessionIdx] = useState(0);
  const [testSessionDone, setTestSessionDone] = useState(false);
  const [testSessionResults, setTestSessionResults] = useState([]);
  const [pendingBadgeToasts, setPendingBadgeToasts] = useState([]);
  const [activeBadgeToast, setActiveBadgeToast] = useState(null);
  const [showBadgeGrid, setShowBadgeGrid] = useState(false);
  const [showSurvey, setShowSurvey] = useState(false);
  const [examDate, setExamDate] = useState(loadExamDate);
  const [showExamPicker, setShowExamPicker] = useState(false);
  const [showHeatmap, setShowHeatmap] = useState(false);
  const [ttsEnabled, setTtsEnabled] = useState(false);
  const [ttsSupported] = useState(() => !!window.speechSynthesis);
  const [sm2DueCount, setSm2DueCount] = useState(() => {
    const sm2State = loadSM2();
    const now = Date.now();
    return Object.values(sm2State).filter(s => s && s.nextReview <= now).length;
  });
  const [swipeHintDismissed, setSwipeHintDismissed] = useState(() => {
    try { return localStorage.getItem('permisb_swipe_hint') === '1'; } catch { return false; }
  });
  const [brokenStreak, setBrokenStreak] = useState(null);
  const [toastMessage, setToastMessage] = useState(null);
  const [sm2BannerDismissed, setSm2BannerDismissed] = useState(() => {
    try {
      return sessionStorage.getItem('permisb_sm2_banner') === new Date().toLocaleDateString('fr-CA');
    } catch { return false; }
  });
  const [showMilestone80, setShowMilestone80] = useState(false);
  const touchStartRef = useRef(null);

  // Pick best available French voice (prefers premium/local over generic)
  const getBestFrenchVoice = () => {
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return null;
    const fr = voices.filter(v => v.lang.startsWith('fr'));
    return (
      fr.find(v => v.name === 'Thomas') ||
      fr.find(v => v.name === 'Marie') ||
      fr.find(v => v.name === 'Amélie') ||
      fr.find(v => v.name.includes('Google') && v.lang === 'fr-FR') ||
      fr.find(v => v.lang === 'fr-FR' && v.localService) ||
      fr.find(v => v.lang === 'fr-FR') ||
      fr.find(v => v.localService) ||
      fr[0] ||
      null
    );
  };

  // TTS speak function
  const speak = useCallback((text) => {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'fr-FR';
    utt.rate = 0.88;
    utt.pitch = 1.05;
    const voice = getBestFrenchVoice();
    if (voice) utt.voice = voice;
    window.speechSynthesis.speak(utt);
  }, [ttsEnabled]);

  // Stop speech on unmount
  useEffect(() => {
    return () => { window.speechSynthesis && window.speechSynthesis.cancel(); };
  }, []);

  // Drain toast queue one at a time
  useEffect(() => {
    if (activeBadgeToast === null && pendingBadgeToasts.length > 0) {
      const [next, ...rest] = pendingBadgeToasts;
      setActiveBadgeToast(next);
      setPendingBadgeToasts(prev => prev.slice(1));
    }
  }, [pendingBadgeToasts, activeBadgeToast]);

  // Survey trigger
  useEffect(() => {
    const survey = loadSurvey();
    if (survey.submitted) return;
    if (survey.showCount >= 2) return;
    if (Date.now() < survey.snoozedUntil) return;

    const gam = loadGamification();
    const firstDate = gam.stats.firstSessionDate;
    if (!firstDate) return;

    const firstMs = new Date(firstDate).getTime();
    const daysSince = (Date.now() - firstMs) / 86400000;
    const verifications = gam.stats.verificationsCompleted || 0;

    if (daysSince >= 2 && verifications >= 30) {
      setShowSurvey(true);
    }
  }, []);

  // Streak break detection on load
  useEffect(() => {
    const gam = loadGamification();
    if (!gam.streak || gam.streak.current === 0) return;
    const lastDate = gam.streak.lastStudyDate;
    if (!lastDate) return;
    const today = new Date().toLocaleDateString('fr-CA');
    const yest = new Date();
    yest.setDate(yest.getDate() - 1);
    const yesterdayStr = yest.toLocaleDateString('fr-CA');
    if (lastDate !== today && lastDate !== yesterdayStr) {
      const broken = gam.streak.current;
      gam.streak.current = 0;
      gam.streak.lastStudyDate = null;
      saveGamification(gam);
      setGamification({ ...gam });
      setBrokenStreak(broken);
    }
  }, []);

  const handleSurveyDismiss = () => {
    setShowSurvey(false);
    const survey = loadSurvey();
    survey.showCount = (survey.showCount || 0) + 1;
    survey.snoozedUntil = Date.now() + 3 * 24 * 60 * 60 * 1000;
    saveSurvey(survey);
  };

  const handleSurveySubmit = () => {
    setShowSurvey(false);
    const survey = loadSurvey();
    survey.submitted = true;
    saveSurvey(survey);
  };

  const total = questionGroups.length;
  const currentRealIdx = shuffleMode && shuffleOrder ? shuffleOrder[groupIdx] : groupIdx;
  const testCurrentIdx = testSession[testSessionIdx] ?? 0;
  const group = mode === 'test' ? questionGroups[testCurrentIdx] : questionGroups[currentRealIdx];

  // Auto-speak on group change (must be after currentRealIdx is declared)
  useEffect(() => {
    if (!ttsEnabled || !window.speechSynthesis) return;
    const currentGroup = questionGroups[currentRealIdx];
    if (!currentGroup || !currentGroup.items || currentGroup.items.length === 0) return;
    window.speechSynthesis.cancel();
    const questions = currentGroup.items.map(item => item.question).filter(Boolean);
    if (questions.length === 0) return;
    let idx = 0;
    const speakNext = () => {
      if (idx >= questions.length) return;
      const utt = new SpeechSynthesisUtterance(questions[idx]);
      utt.lang = 'fr-FR';
      utt.rate = 0.88;
      utt.pitch = 1.05;
      const voice = getBestFrenchVoice();
      if (voice) utt.voice = voice;
      utt.onend = () => { idx++; setTimeout(speakNext, 400); };
      window.speechSynthesis.speak(utt);
    };
    idx = 0;
    speakNext();
  }, [groupIdx, ttsEnabled]);

  const navigate = (newIdx) => {
    setGroupIdx(newIdx);
    setResetSignal(s => s + 1);
    setTestAnswers({});
    setTestResults(null);
    setTestRevealed(false);
    setTestFeedback(null);
    setTestGrading(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const goFirst = () => navigate(0);
  const goPrev  = () => { if (groupIdx > 0) navigate(groupIdx - 1); };
  const goNext  = () => { if (groupIdx < total - 1) navigate(groupIdx + 1); };

  const startTestSession = () => {
    const session = getTestSession(ratings);
    setTestSession(session);
    setTestSessionIdx(0);
    setTestSessionDone(false);
    setTestSessionResults([]);
    setTestAnswers({});
    setTestResults(null);
    setTestRevealed(false);
    setTestFeedback(null);
    setTestGrading(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const goNextTestGroup = () => {
    if (testSessionIdx < testSession.length - 1) {
      setTestSessionIdx(i => i + 1);
      setTestAnswers({});
      setTestResults(null);
      setTestRevealed(false);
      setTestFeedback(null);
      setTestGrading(false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      setTestSessionDone(true);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  const toggleShuffle = () => {
    if (!shuffleMode) {
      const order = buildWeightedOrder(ratings);
      // SM-2: sort due groups to the front
      const sm2Now = loadSM2();
      const now = Date.now();
      const isDue = (idx) => {
        const g = questionGroups[idx];
        const s = sm2Now[String(g.num)];
        return s && s.nextReview <= now;
      };
      const due = order.filter(idx => isDue(idx));
      const notDue = order.filter(idx => !isDue(idx));
      setShuffleOrder([...due, ...notDue]);
      setShuffleMode(true);
      navigate(0);
    } else {
      setShuffleMode(false);
      setShuffleOrder(null);
      navigate(0);
    }
  };

  const toggleTestMode = () => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    if (mode === 'test') {
      setMode('study');
      setTestAnswers({});
      setTestResults(null);
      setTestRevealed(false);
      setTestFeedback(null);
      setTestGrading(false);
      setTestSession([]);
      setTestSessionIdx(0);
      setTestSessionDone(false);
      setTestSessionResults([]);
      return;
    }
    if (!consentGiven) {
      setShowConsentModal(true);
      return;
    }
    setMode('test');
    startTestSession();
  };

  const acceptConsent = () => {
    try { localStorage.setItem('permisb_consent_v1', 'true'); } catch {}
    setConsentGiven(true);
    setShowConsentModal(false);
    setMode('test');
    startTestSession();
  };

  const handleAnswerChange = (type, value) => {
    setTestAnswers(prev => ({ ...prev, [type]: value }));
  };

  const handleVerify = async () => {
    const allEmpty = group.items.every((item) => !testAnswers[item.type]?.trim());
    if (allEmpty) {
      setToastMessage('Réponds à au moins une question avant de vérifier.');
      setTimeout(() => setToastMessage(null), 3000);
      return;
    }
    setTestGrading(true);
    try {
      const answers = group.items.map(item => ({
        type: item.type,
        question: item.question,
        correctAnswer: item.answer,
        studentAnswer: testAnswers[item.type] || '',
      }));

      const res = await fetch('/api/grade', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groupNum: group.num, answers }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!Array.isArray(data.grades) || data.grades.length === 0) {
        throw new Error('invalid_grades');
      }

      setTestResults(data);
      setTestRevealed(true);
      const nextSessionResults = [...testSessionResults, { groupNum: group.num, groupGrade: data.groupGrade }];
      setTestSessionResults(nextSessionResults);

      // Auto-save AI grade to ratings
      if (['correct', 'partial', 'wrong'].includes(data.groupGrade)) {
        const key = String(group.num);
        const prev = ratings[key] || { correct: 0, partial: 0, wrong: 0 };
        const next = { ...prev, [data.groupGrade]: (prev[data.groupGrade] || 0) + 1 };
        const updated = { ...ratings, [key]: next };
        setRatings(updated);
        saveRatings(updated);
      }

      // Gamification
      {
        let gam = loadGamification();
        gam = applyBaseGamification(gam, { groupNum: group.num, basePoints: POINTS[`test_${data.groupGrade}`] || 0 });
        gam.stats.verificationsCompleted = (gam.stats.verificationsCompleted || 0) + 1;

        // Session bonus — if this is the last test group
        const isLastInSession = nextSessionResults.length === testSession.length;
        if (isLastInSession) {
          const allCorrect = nextSessionResults.every(r => r.groupGrade === 'correct');
          if (allCorrect) {
            gam.points = (gam.points || 0) + POINTS.test_session_perfect;
            gam.stats.perfectTests = (gam.stats.perfectTests || 0) + 1;
          } else {
            gam.points = (gam.points || 0) + POINTS.test_session_complete;
          }
          gam.stats.testsCompleted = (gam.stats.testsCompleted || 0) + 1;
        }

        const { updatedBadges: ubVerify, newlyUnlocked: nuVerify } = evaluateBadges(gam, updated);
        gam.badges = ubVerify;
        saveGamification(gam);
        setGamification({ ...gam });
        if (nuVerify.length > 0) setPendingBadgeToasts(prev => [...prev, ...nuVerify]);
      }

      // SM-2 update
      {
        const quality = data.groupGrade === 'correct' ? 5 : data.groupGrade === 'partial' ? 3 : 1;
        const sm2Data = loadSM2();
        const updatedSm2 = updateSM2(sm2Data, group.num, quality);
        saveSM2(updatedSm2);
        setSm2DueCount(Object.values(updatedSm2).filter(s => s && s.nextReview <= Date.now()).length);
      }

      if (data.groupGrade === 'correct') {
        fireConfetti({ particleCount: 70, spread: 65, origin: { y: 0.55 }, colors: ['#6366f1', '#10b981', '#f59e0b'] });
      }
    } catch {
      setTestRevealed(true);
      setTestResults({ grades: [], groupGrade: null, error: true });
    } finally {
      setTestGrading(false);
    }
  };

  const handleFeedback = (vote) => {
    setTestFeedback(vote);
    if (testResults?.groupGrade) {
      saveFeedbackEntry({
        groupNum: group.num,
        grade: testResults.groupGrade,
        accurate: vote === 'up',
        ts: new Date().toISOString(),
      });
    }
  };

  const handleRate = (direction) => {
    const key = String(group.num);
    const prev = ratings[key] || { correct: 0, partial: 0, wrong: 0 };
    const next = { ...prev, [direction]: (prev[direction] || 0) + 1 };
    const updated = { ...ratings, [key]: next };
    setRatings(updated);
    saveRatings(updated);

    // Gamification
    let gam = loadGamification();
    gam = applyBaseGamification(gam, { groupNum: group.num, basePoints: POINTS[`study_${direction}`] || 0 });
    const { updatedBadges: ubRate, newlyUnlocked: nuRate } = evaluateBadges(gam, updated);
    gam.badges = ubRate;
    saveGamification(gam);
    setGamification({ ...gam });
    if (nuRate.length > 0) setPendingBadgeToasts(prev => [...prev, ...nuRate]);

    if (direction === 'correct') {
      fireConfetti({ particleCount: 70, spread: 65, origin: { y: 0.55 }, colors: ['#6366f1', '#10b981', '#f59e0b'] });
    }
    // Auto-advance
    if (groupIdx < total - 1) navigate(groupIdx + 1);
  };

  const onSelect = (e) => {
    const val = parseInt(e.target.value, 10);
    if (!isNaN(val) && val >= 0 && val < total) navigate(val);
  };

  const groupRating = ratings[String(group.num)];
  const isWeak = groupRating && (groupRating.wrong||0) > (groupRating.correct||0);
  const rank = computeRank(ratings, gamification);
  const mc = masteredCount(ratings);
  const testsCompleted = gamification.stats?.testsCompleted || 0;
  const nextRankInfo = getNextRankInfo(rank, mc, testsCompleted, 0);

  // Milestone: 80 groups mastered
  useEffect(() => {
    if (mc >= 80 && !localStorage.getItem('permisb_milestone_80')) {
      localStorage.setItem('permisb_milestone_80', '1');
      setShowMilestone80(true);
      fireConfetti({ particleCount: 200, spread: 100, origin: { y: 0.4 }, colors: ['#6366f1', '#10b981', '#f59e0b', '#ec4899'] });
    }
  }, [mc]);

  // Exam countdown
  const daysUntilExam = (() => {
    if (!examDate) return null;
    const [y, m, d] = examDate.split('-').map(Number);
    const exam = new Date(y, m - 1, d);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.ceil((exam - today) / 86400000);
  })();
  const groupsPerDay = (daysUntilExam !== null && daysUntilExam > 0)
    ? Math.ceil(100 / daysUntilExam)
    : null;

  const handleTouchStart = (e) => {
    const t = e.touches[0];
    touchStartRef.current = { x: t.clientX, y: t.clientY };
  };

  const handleTouchEnd = (e) => {
    if (!touchStartRef.current) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartRef.current.x;
    const dy = t.clientY - touchStartRef.current.y;
    touchStartRef.current = null;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (absDx > 60 && absDx > absDy) {
      if (dx > 0) handleRate('correct');
      else handleRate('wrong');
    } else if (dy < -60 && absDy > absDx) {
      const firstCard = document.querySelector('.perspective-1000');
      if (firstCard) firstCard.click();
    }
  };

  return html`
    ${showConsentModal && html`
      <${ConsentModal}
        onAccept=${acceptConsent}
        onDecline=${() => setShowConsentModal(false)}
      />
    `}
    ${showBadgeGrid && html`
      <${BadgeGridOverlay}
        badges=${gamification.badges}
        onClose=${() => setShowBadgeGrid(false)}
      />
    `}
    ${activeBadgeToast && html`
      <${BadgeToast}
        key=${activeBadgeToast}
        badgeKey=${activeBadgeToast}
        onDismiss=${() => setActiveBadgeToast(null)}
      />
    `}
    ${showSurvey && html`
      <${FeedbackSurvey}
        onDismiss=${handleSurveyDismiss}
        onSubmit=${handleSurveySubmit}
      />
    `}
    ${showExamPicker && html`
      <${ExamDatePicker}
        examDate=${examDate}
        onSave=${(d) => { saveExamDate(d); setExamDate(d); }}
        onClose=${() => setShowExamPicker(false)}
      />
    `}
    ${showHeatmap && html`
      <${HeatmapOverlay}
        ratings=${ratings}
        onNavigate=${navigate}
        onClose=${() => setShowHeatmap(false)}
      />
    `}
    ${brokenStreak !== null && html`
      <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white px-5 py-3 rounded-2xl shadow-xl text-sm max-w-xs w-full mx-4 animate-slide-up">
        <p class="font-semibold mb-0.5">Ta série de ${brokenStreak}j s'est arrêtée 😤</p>
        <p class="text-gray-400 text-xs">Mais tu es de retour ! Objectif : 3j de suite 💪</p>
        <button onClick=${() => setBrokenStreak(null)} class="mt-2 text-xs text-indigo-400 hover:text-indigo-300">OK</button>
      </div>
    `}
    ${toastMessage && html`
      <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white px-5 py-3 rounded-2xl shadow-xl text-sm max-w-xs w-full mx-4 animate-slide-up text-center">
        ${toastMessage}
      </div>
    `}
    ${showMilestone80 && html`
      <div class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center">
          <div class="text-6xl mb-4">🎉</div>
          <h2 class="text-xl font-black text-slate-800 mb-2">Prêt(e) pour l'examen !</h2>
          <p class="text-sm text-slate-600 leading-relaxed mb-6">
            Tu as maîtrisé <span class="font-bold text-indigo-600">80 groupes sur 100</span>.
            L'examinateur ne va pas t'avoir.
          </p>
          <button onClick=${() => setShowMilestone80(false)}
            class="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold text-sm active:bg-indigo-700">
            Continuer 🚀
          </button>
        </div>
      </div>
    `}
    <div class="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-800">

      <header class="bg-white px-4 pt-2.5 pb-1.5 shadow-sm z-10 sticky top-0">
        <!-- Row 1: logo + title | icon buttons -->
        <div class="max-w-lg mx-auto flex items-center justify-between gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <div class="p-1.5 bg-indigo-600 rounded-lg text-white shrink-0"><${SteeringWheel}/></div>
            <div class="min-w-0">
              <h1 class="font-bold text-sm leading-tight text-slate-800 whitespace-nowrap">Permis B — Vérifs</h1>
              <p class="text-xs leading-tight mt-0.5 truncate ${
                shuffleMode ? 'text-amber-500 font-semibold'
                : mode === 'test' ? 'text-red-500 font-semibold'
                : 'text-slate-400'
              }">
                ${shuffleMode ? 'Mode aléatoire actif'
                  : mode === 'test' ? 'Mode Test actif'
                  : daysUntilExam !== null && daysUntilExam > 0
                    ? html`${RANK_TITLES[rank]} · <span class="text-indigo-500 font-semibold">Examen dans ${daysUntilExam}j · ${groupsPerDay} gr/j</span>`
                    : daysUntilExam !== null && daysUntilExam <= 0
                      ? html`<span class="text-red-500 font-semibold">Jour J !</span>`
                      : RANK_TITLES[rank]
                }
              </p>
            </div>
          </div>
          <!-- Icon buttons: badges, exam, heatmap, TTS -->
          <div class="flex items-center gap-1 shrink-0">
            <button onClick=${() => setShowBadgeGrid(true)}
              class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 active:bg-slate-300 transition-colors text-base"
              title="Mes badges">🏆</button>
            <button onClick=${() => setShowExamPicker(p => !p)}
              class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 active:bg-slate-300 transition-colors text-base"
              title="Date d'examen">📅</button>
            <button onClick=${() => setShowHeatmap(true)}
              class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 active:bg-slate-300 transition-colors text-base"
              title="Carte des zones faibles">🗺️</button>
            ${ttsSupported && html`<button onClick=${() => {
              if (ttsEnabled) { window.speechSynthesis.cancel(); }
              setTtsEnabled(v => !v);
            }}
              class=${`w-8 h-8 flex items-center justify-center rounded-lg text-base transition-colors ${
                ttsEnabled ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
              }`}
              title=${ttsEnabled ? 'Désactiver la lecture' : 'Lire les questions'}
            >${ttsEnabled ? '🔊' : '🔇'}</button>`}
          </div>
        </div>
        <!-- Row 2: streak + points | mode buttons + counter -->
        <div class="max-w-lg mx-auto flex items-center justify-between mt-2 gap-2">
          <div class="flex items-center gap-1.5">
            ${gamification.streak.current >= 1 && html`
              <span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full bg-orange-50 text-orange-600 border border-orange-200">
                🔥 <span>${gamification.streak.current}j</span>
              </span>
            `}
            <span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full bg-amber-50 text-amber-600 border border-amber-200">
              ⭐ ${gamification.points.toLocaleString('fr-FR')}
            </span>
          </div>
          <div class="flex items-center gap-1.5">
            ${mode === 'study' && html`<button
              onClick=${toggleShuffle}
              class=${`flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-semibold transition-colors ${
                shuffleMode ? 'bg-amber-500 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
              }`}
            >
              <${Shuffle}/> ${shuffleMode ? 'Arrêter' : 'Aléatoire'}${!shuffleMode && sm2DueCount > 0 ? html` <span class="bg-red-500 text-white rounded-full px-1.5 text-xs leading-none">${sm2DueCount}</span>` : ''}
            </button>`}
            <button
              onClick=${toggleTestMode}
              class=${`flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-semibold transition-colors ${
                mode === 'test' ? 'bg-red-500 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
              }`}
            >
              ${mode === 'test' ? 'Quitter test' : 'Test'}
            </button>
            ${mode === 'test'
              ? html`<span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-lg tabular-nums">
                  ${testSessionIdx + 1}<span class="font-normal text-slate-400">/3</span>
                </span>`
              : html`<span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-lg tabular-nums">
                  Q.${groupIdx + 1}<span class="font-normal text-slate-400">/${total}</span>
                </span>`
            }
          </div>
        </div>
        <${ScoreBar} ratings=${ratings}/>
      </header>

      ${sm2DueCount > 0 && !sm2BannerDismissed && mode === 'study' && html`
        <div class="max-w-lg mx-auto w-full px-4 pt-3">
          <div class="bg-indigo-50 border border-indigo-200 rounded-2xl px-4 py-3 flex items-center justify-between gap-3">
            <div class="flex-1">
              <p class="text-sm font-semibold text-indigo-800">
                📅 ${sm2DueCount} révision${sm2DueCount > 1 ? 's' : ''} due${sm2DueCount > 1 ? 's' : ''} aujourd'hui
              </p>
              <button onClick=${() => { if (!shuffleMode) toggleShuffle(); setSm2BannerDismissed(true); }}
                class="text-xs text-indigo-600 font-semibold mt-1 hover:text-indigo-800">
                Commencer les révisions →
              </button>
            </div>
            <button onClick=${() => {
              setSm2BannerDismissed(true);
              try { sessionStorage.setItem('permisb_sm2_banner', new Date().toLocaleDateString('fr-CA')); } catch {}
            }} class="text-indigo-400 hover:text-indigo-600 font-bold text-lg leading-none">✕</button>
          </div>
        </div>
      `}

      <main class="flex-1 flex flex-col max-w-lg mx-auto w-full px-4 pt-4 pb-28">

        ${mode === 'study' && !swipeHintDismissed && html`
          <div class="flex items-center justify-between bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-2.5 mb-3 text-xs text-indigo-700">
            <span>💡 Glissez → Je sais · ← À revoir · ↑ Retourner</span>
            <button onClick=${() => {
              setSwipeHintDismissed(true);
              try { localStorage.setItem('permisb_swipe_hint', '1'); } catch {}
            }} class="text-indigo-400 hover:text-indigo-600 font-bold ml-3">✕</button>
          </div>
        `}

        ${mode === 'study' && html`
          <div class="bg-white rounded-2xl border border-slate-100 px-4 py-3 mb-3 shadow-sm">
            <div class="flex items-center justify-between mb-1.5">
              <span class="text-xs font-semibold text-slate-700">${RANK_TITLES[rank]}</span>
              ${nextRankInfo ? html`<span class="text-xs text-slate-400">→ ${nextRankInfo.nextTitle}</span>` : html`<span class="text-xs text-indigo-600 font-semibold">🏆 Rang max !</span>`}
            </div>
            ${nextRankInfo && html`
              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden mb-1.5">
                <div class="h-full bg-indigo-500 rounded-full transition-all duration-500" style=${`width:${nextRankInfo.pct}%`}></div>
              </div>
              <p class="text-xs text-slate-400">${nextRankInfo.label} pour le rang suivant</p>
            `}
          </div>
        `}

        ${mode === 'test' && testSessionDone ? html`
          <${TestSummary}
            results=${testSessionResults}
            onRestart=${startTestSession}
            onQuit=${toggleTestMode}
          />
        ` : html`
        <div class="flex items-center gap-3 mb-4">
          <div class=${`flex-shrink-0 w-14 h-14 rounded-2xl flex items-center justify-center shadow-md ${isWeak ? 'bg-red-500' : 'bg-indigo-600'}`}>
            <span class="text-white font-black text-xl">${group.num}</span>
          </div>
          <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wide">Question ${group.num} / ${total}</p>
            <div class="flex flex-wrap gap-1.5 mt-1">
              ${group.items.map(it => html`
                <span class=${`text-xs px-2 py-0.5 rounded-full font-semibold ${TYPE[it.type].badge}`}>${TYPE[it.type].short}</span>
              `)}
              ${isWeak && html`<span class="text-xs px-2 py-0.5 rounded-full font-semibold bg-red-100 text-red-600">À revoir</span>`}
            </div>
          </div>
        </div>

        ${mode === 'study' && html`<${RatingBar} groupNum=${group.num} ratings=${ratings} onRate=${handleRate}/>`}

        ${mode === 'study'
          ? html`<div onTouchStart=${handleTouchStart} onTouchEnd=${handleTouchEnd} style="touch-action: pan-y">
              ${group.items.map((item, i) => html`
                <${FlipCard} key=${`${group.num}-${i}`} item=${item} resetSignal=${resetSignal}/>
              `)}
            </div>`
          : group.items.map(item => html`
              <${TestCard}
                key=${`test-${group.num}-${item.type}`}
                item=${item}
                answer=${testAnswers[item.type] || ''}
                onAnswerChange=${handleAnswerChange}
                gradeResult=${testResults?.grades?.find(g => g.type === item.type)}
                revealed=${testRevealed}
              />
            `)
        }

        ${mode === 'test' && testRevealed && !testResults?.error && html`
          <${FeedbackPrompt} onFeedback=${handleFeedback} given=${testFeedback}/>
        `}
        ${mode === 'test' && testRevealed && testResults?.error && html`
          <div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-3 text-xs text-amber-700">
            La correction automatique est indisponible. Évaluez vous-même ci-dessous.
          </div>
          <${RatingBar} groupNum=${group.num} ratings=${ratings} onRate=${handleRate}/>
        `}
        `}

      </main>

      <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg z-20">
        <div class="max-w-lg mx-auto px-4 py-3 flex items-center gap-2">
          ${mode === 'study' ? html`
            <button onClick=${goFirst} disabled=${groupIdx === 0}
              class=${`flex items-center gap-1 px-3 py-2.5 rounded-xl text-xs font-semibold transition-colors ${groupIdx === 0 ? 'text-slate-300 bg-slate-50 cursor-not-allowed' : 'text-indigo-600 bg-indigo-50 hover:bg-indigo-100'}`}>
              <${SkipBack}/><span>Début</span>
            </button>
            <button onClick=${goPrev} disabled=${groupIdx === 0}
              class=${`flex-1 flex items-center justify-center gap-1 py-2.5 rounded-xl font-semibold text-sm transition-colors ${groupIdx === 0 ? 'bg-slate-100 text-slate-300 cursor-not-allowed' : 'bg-white border border-slate-200 text-slate-700 active:bg-slate-50 shadow-sm'}`}>
              <${ChevronLeft}/>Préc.
            </button>
            <select value=${groupIdx} onChange=${onSelect}
              class="px-2 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700 bg-white shadow-sm text-center appearance-none cursor-pointer"
              style="min-width:64px">
              ${questionGroups.map((_, i) => html`<option value=${i}>Q.${i+1}</option>`)}
            </select>
            <button onClick=${goNext} disabled=${groupIdx === total - 1}
              class=${`flex-1 flex items-center justify-center gap-1 py-2.5 rounded-xl font-semibold text-sm transition-colors ${groupIdx === total - 1 ? 'bg-slate-100 text-slate-300 cursor-not-allowed' : 'bg-white border border-slate-200 text-slate-700 active:bg-slate-50 shadow-sm'}`}>
              Suiv.<${ChevronRight}/>
            </button>
          ` : html`
            ${!testRevealed ? html`
              <button
                onClick=${() => navigate(groupIdx + 1)}
                disabled=${testGrading}
                class="flex items-center justify-center gap-1 px-3 py-3 rounded-xl text-xs font-semibold text-slate-500 bg-slate-100 active:bg-slate-200 disabled:opacity-40 shrink-0"
              >Passer →</button>
              <button
                onClick=${handleVerify}
                disabled=${testGrading}
                class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-semibold text-sm bg-indigo-600 text-white active:bg-indigo-700 disabled:opacity-60"
              >
                ${testGrading
                  ? html`<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> Correction en cours...`
                  : 'Vérifier mes réponses'
                }
              </button>
            ` : html`
              <button onClick=${goNextTestGroup}
                class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-semibold text-sm bg-indigo-600 text-white active:bg-indigo-700"
              >
                ${testSessionIdx < testSession.length - 1 ? html`Suivant <${ChevronRight}/>` : 'Voir mes résultats'}
              </button>
            `}
          `}
        </div>
      </div>

      <div class="h-24"></div>
      <footer class="text-center pb-5 pt-2">
        <a href="https://felipetroy.pro" target="_blank" rel="noopener noreferrer"
           class="text-xs text-slate-400 hover:text-indigo-600 transition-colors">
          Made by <span class="font-semibold">Felipe Díaz Marín</span> · felipetroy.pro
        </a>
      </footer>
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
